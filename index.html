<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Therapy Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#fff; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
#bar { display:flex; justify-content:space-between; align-items:center; padding:8px 20px; background:rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
#bar h1 { font-size:15px; color:#7ef7c8; }
.stats { display:flex; gap:18px; }
.s { text-align:center; }
.sl { font-size:9px; color:rgba(255,255,255,0.4); text-transform:uppercase; }
.sv { font-size:18px; font-weight:700; color:#7ef7c8; }
#wrap { flex:1; position:relative; overflow:hidden; }
#gc { position:absolute; inset:0; width:100%; height:100%; }
#dbg { position:absolute; top:65px; left:10px; font-size:12px; color:#ffd700; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:8px; z-index:9; line-height:1.8; }
#prev { position:absolute; bottom:14px; right:14px; width:180px; height:135px; border-radius:10px; overflow:hidden; border:2px solid #7ef7c840; z-index:5; }
#prev video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }
#pb { position:absolute; bottom:0; left:0; right:0; height:4px; background:rgba(255,255,255,0.07); }
#pbf { height:100%; background:#7ef7c8; width:0; transition:width .3s; }
.overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(10,10,26,0.94); z-index:20; gap:14px; }
.overlay h2 { font-size:26px; font-weight:700; color:#7ef7c8; }
.overlay p { color:rgba(255,255,255,0.5); font-size:13px; text-align:center; max-width:380px; line-height:1.8; }
.btn { padding:11px 26px; border-radius:10px; border:none; font-size:14px; font-weight:600; cursor:pointer; background:#7ef7c8; color:#0a0a1a; }
</style>
</head>
<body>
<div id="bar">
  <h1>✋ Hand Therapy Game</h1>
  <div class="stats">
    <div class="s"><div class="sl">Score</div><div class="sv" id="sc">0</div></div>
    <div class="s"><div class="sl">Level</div><div class="sv" id="lv">1</div></div>
    <div class="s"><div class="sl">Done</div><div class="sv" id="dn">0</div></div>
    <div class="s"><div class="sl">Time</div><div class="sv" id="tm">3:00</div></div>
  </div>
  <div style="font-size:12px;color:rgba(255,255,255,0.4)">
    <span style="color:#00c8ff">● Right</span> &nbsp;
    <span style="color:#50ff78">● Left</span>
  </div>
</div>

<div id="wrap">
  <canvas id="gc"></canvas>
  <div id="dbg">Starting...</div>
  <div id="prev"><video id="pvid" autoplay playsinline muted></video></div>
  <div id="pb"><div id="pbf"></div></div>

  <div class="overlay" id="ov-welcome">
    <h2>✋ Hand Therapy Game</h2>
    <p>
      <strong style="color:#7ef7c8">Close your fist</strong> over a ball to grab it.<br>
      Move it to the matching colored target.<br>
      <strong style="color:#7ef7c8">Open your hand</strong> to place it.<br><br>
      Both hands work at the same time!
    </p>
    <button class="btn" id="btn-start">Allow Camera &amp; Play</button>
  </div>

  <div class="overlay" id="ov-over" style="display:none">
    <h2>🎉 Session Complete!</h2>
    <p id="ov-results"></p>
    <button class="btn" onclick="restart()">Play Again</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>

// ── Canvas ──
const gc = document.getElementById('gc');
const ctx = gc.getContext('2d');
function W(){ return gc.width; }
function H(){ return gc.height; }
function resize(){
  const w = document.getElementById('wrap');
  gc.width = w.clientWidth;
  gc.height = w.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Config ──
const COLORS = ['#6b6bff','#3ddff0','#77cb6b','#ff964d','#ce6bff','#4dc8ff'];
const HCOL   = { Right:'#00c8ff', Left:'#50ff78' };
const SESSION = 180;
const BALLS_PER_ROUND = 3;

// ── Game state ──
let score=0, level=1, placed=0, totalPlaced=0;
let balls=[], targets=[], sparks=[];
let t0=null, running=false;
let flashTxt='', flashAt=0;

// ── Hand state (simple and clean) ──
const H_RIGHT = { x:200, y:300, fist:false, visible:false, holding:null, readyToGrab:false };
const H_LEFT  = { x:500, y:300, fist:false, visible:false, holding:null, readyToGrab:false };

// ── Spawn new round of balls ──
function spawnRound(){
  balls   = [];
  targets = [];
  // Make sure no hand thinks it's holding anything
  H_RIGHT.holding = null;
  H_LEFT.holding  = null;

  const ballR = Math.max(24, 50 - level*2);
  const tgtR  = Math.max(34, 66 - level*2);
  const n     = Math.min(BALLS_PER_ROUND + Math.floor(level/2), 5);

  for(let i=0; i<n; i++){
    const c = COLORS[i % COLORS.length];
    targets.push({
      x: 55 + Math.random()*(W()*0.35),
      y: 85 + Math.random()*(H()-175),
      c, r:tgtR, id:i, done:false
    });
    balls.push({
      x: W()*0.60 + Math.random()*(W()*0.33),
      y: 85 + Math.random()*(H()-175),
      c, r:ballR, id:i,
      placed: false,
      heldBy: null   // null | 'Right' | 'Left'
    });
  }
}

function restart(){
  document.getElementById('ov-over').style.display='none';
  score=0; level=1; placed=0; totalPlaced=0;
  t0=Date.now(); running=true;
  spawnRound(); ui();
}

// ── Flash message ──
function flash(msg){ flashTxt=msg; flashAt=Date.now(); }

// ── Score UI ──
function ui(){
  document.getElementById('sc').textContent = score;
  document.getElementById('lv').textContent = level;
  document.getElementById('dn').textContent = totalPlaced;
  document.getElementById('pbf').style.width = (placed / (BALLS_PER_ROUND + Math.floor(level/2)) * 100) + '%';
}

// ── Timer ──
function tick(){
  if(!t0) return;
  const rem = Math.max(0, SESSION - (Date.now()-t0)/1000);
  const m=Math.floor(rem/60), s=Math.floor(rem%60);
  document.getElementById('tm').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if(rem <= 0 && running){ running=false; endGame(); }
}

function endGame(){
  const e = Math.floor((Date.now()-t0)/1000);
  document.getElementById('ov-results').innerHTML =
    `Score: ${score} &nbsp;|&nbsp; Level: ${level} &nbsp;|&nbsp; Placed: ${totalPlaced}`;
  document.getElementById('ov-over').style.display='flex';
}

// ── Sparks ──
function burst(x,y,c){
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c,l:1,r:3+Math.random()*5});
  }
}

// ── Core hand update (called every frame) ──
function processHand(hand, label){
  if(!hand.visible){
    // Drop whatever it was holding
    if(hand.holding !== null){
      const b = balls.find(b=>b.id===hand.holding);
      if(b) b.heldBy = null;
      hand.holding = null;
    }
    return;
  }

  // Hand is always visible when detected — show cursor regardless of readyToGrab
  // readyToGrab only controls whether a NEW grab can start

  if(!hand.fist) hand.readyToGrab = true; // any open = ready again

  if(hand.fist && hand.holding === null && hand.readyToGrab){
    for(const b of balls){
      if(b.placed) continue;
      if(b.heldBy !== null) continue;
      const d = Math.hypot(hand.x - b.x, hand.y - b.y);
      if(d < b.r + 60){
        b.heldBy = label;
        hand.holding = b.id;
        hand.readyToGrab = false;
        break;
      }
    }
  }

  // If fist but nothing nearby and readyToGrab=false, reset it so hand is not stuck
  if(hand.fist && hand.holding === null && !hand.readyToGrab){
    hand.readyToGrab = true; // don't lock the hand forever
  }

  // ── DRAG: move ball with hand ──
  if(hand.fist && hand.holding !== null){
    const b = balls.find(b=>b.id===hand.holding);
    if(b){
      b.x += (hand.x - b.x) * 0.6;
      b.y += (hand.y - b.y) * 0.6;
    } else {
      // Ball disappeared (placed by other hand?) — clear
      hand.holding = null;
    }
  }

  // ── RELEASE: hand opened ──
  if(!hand.fist && hand.holding !== null){
    const b = balls.find(b=>b.id===hand.holding);

    // Always clear holding first — prevents any freeze
    hand.holding = null;

    if(b && !b.placed){
      b.heldBy = null;
      const t = targets.find(t=>t.id===b.id);
      const onTarget = t && Math.hypot(b.x-t.x, b.y-t.y) < t.r + 50;

      if(onTarget){
        // Place it
        b.x=t.x; b.y=t.y;
        b.placed=true; b.heldBy=null;
        t.done=true;
        burst(t.x, t.y, t.c);
        score   += 10*level;
        placed  += 1;
        totalPlaced += 1;
        flash(`+${10*level}!`);
        ui();

        // Check if all balls in this round are placed
        const allDone = balls.every(b=>b.placed);
        if(allDone){
          level += 1;
          placed = 0;
          flash(`Level ${level}!`);
          // Small delay so player can see the flash
          setTimeout(spawnRound, 1000);
        }
      }
      // If not on target — ball stays where it is, can be grabbed again
    }
  }
}

// ── Draw ──
function drawBg(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W(),H());
  ctx.fillStyle='rgba(255,255,255,0.025)';
  for(let x=0;x<W();x+=40)
    for(let y=0;y<H();y+=40){
      ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
    }
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.07)';
  ctx.lineWidth=1; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(W()/2,0); ctx.lineTo(W()/2,H()); ctx.stroke();
  ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.font='13px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('Target Zone', W()*.25, 28);
  ctx.fillText('Grab from here', W()*.75, 28);
}

function drawTarget(t){
  const p = Math.sin(Date.now()*.003)*4, r = t.r+p;
  const g = ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,r+22);
  g.addColorStop(0,t.c+'44'); g.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(t.x,t.y,r+22,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  if(t.done){
    ctx.beginPath(); ctx.arc(t.x,t.y,r,0,Math.PI*2);
    ctx.fillStyle=t.c+'55'; ctx.fill();
    ctx.strokeStyle=t.c; ctx.lineWidth=3; ctx.stroke();
    ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(t.x-12,t.y); ctx.lineTo(t.x-3,t.y+10); ctx.lineTo(t.x+14,t.y-10);
    ctx.stroke();
  } else {
    ctx.save(); ctx.setLineDash([8,5]);
    ctx.beginPath(); ctx.arc(t.x,t.y,r,0,Math.PI*2);
    ctx.strokeStyle=t.c+'99'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  }
}

function drawBall(b){
  if(b.placed) return;
  const held = b.heldBy !== null;
  const r = b.r * (held ? 1.18 : 1);
  ctx.save();
  ctx.shadowColor=b.c; ctx.shadowBlur=held?28:10;
  const g=ctx.createRadialGradient(b.x-r*.3,b.y-r*.3,r*.05,b.x,b.y,r);
  g.addColorStop(0,'#fff5'); g.addColorStop(.3,b.c); g.addColorStop(1,b.c+'99');
  ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(b.x-r*.25,b.y-r*.25,r*.2,r*.12,-.5,0,Math.PI*2); ctx.fill();
  if(held){
    ctx.strokeStyle=HCOL[b.heldBy]+'cc'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(b.x,b.y,r+6,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawHand(hand, label){
  if(!hand.visible) return;  // only hide if truly not detected
  const col=HCOL[label], r=hand.fist?16:24;
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.arc(hand.x,hand.y,r,0,Math.PI*2);
  ctx.fillStyle=col+'44'; ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
  ctx.shadowBlur=0;
  if(!hand.fist){
    const ang=[-0.6,-0.2,0.2,0.6,1.1], len=[25,30,30,25,18];
    ctx.strokeStyle=col+'99'; ctx.lineWidth=3; ctx.lineCap='round';
    for(let i=0;i<5;i++){
      const a=ang[i]-Math.PI/2;
      ctx.beginPath(); ctx.moveTo(hand.x,hand.y);
      ctx.lineTo(hand.x+Math.cos(a)*len[i], hand.y+Math.sin(a)*len[i]);
      ctx.stroke();
    }
  } else {
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(hand.x,hand.y,r+8,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.fillStyle=col; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(`${label[0]} ${hand.fist?'✊':'✋'}`, hand.x, hand.y-r-8);
  ctx.restore();
}

function drawSparks(){
  for(const s of sparks){
    ctx.save(); ctx.globalAlpha=s.l;
    ctx.fillStyle=s.c;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*s.l,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawFlash(){
  if(!flashTxt || Date.now()-flashAt>1200) return;
  const a=Math.max(0,(1200-(Date.now()-flashAt))/1200);
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle='#ffd700';
  ctx.font='bold 56px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(flashTxt, W()/2, H()/2);
  ctx.restore();
}

// ── Main game loop ──
function loop(){
  resize();
  drawBg();

  // Update sparks
  sparks = sparks.filter(s=>s.l>0);
  for(const s of sparks){
    s.x+=s.vx; s.y+=s.vy; s.vy+=.1; s.l-=.025; s.r*=.97;
  }

  if(running){
    // Fade hands if not seen recently
    if(Date.now()-H_RIGHT._lastSeen > 500) H_RIGHT.visible=false;
    if(Date.now()-H_LEFT._lastSeen  > 500) H_LEFT.visible=false;

    processHand(H_RIGHT, 'Right');
    processHand(H_LEFT,  'Left');
    tick();
  }

  for(const t of targets) drawTarget(t);
  for(const b of balls)   drawBall(b);
  drawSparks();
  drawHand(H_RIGHT, 'Right');
  drawHand(H_LEFT,  'Left');
  drawFlash();

  if(!H_RIGHT.visible && !H_LEFT.visible && running){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.font='20px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('Show your hands to play!', W()/2, H()/2);
  }

  requestAnimationFrame(loop);
}

// ── MediaPipe results ──
function onResults(results){
  // Reset both hands to not visible — re-enable below
  H_RIGHT.visible = false;
  H_LEFT.visible  = false;

  if(!results.multiHandLandmarks || results.multiHandLandmarks.length===0){
    document.getElementById('dbg').textContent='No hands detected';
    return;
  }

  let dbgText = '';

  results.multiHandLandmarks.forEach((lms, i)=>{
    const raw   = results.multiHandedness[i].label;
    const label = raw==='Left' ? 'Right' : 'Left'; // swap for front camera
    const hand  = label==='Right' ? H_RIGHT : H_LEFT;

    // Palm centre = average of wrist + 4 knuckles
    const idx = [0,5,9,13,17];
    let px=0, py=0;
    for(const j of idx){ px+=lms[j].x; py+=lms[j].y; }
    px/=idx.length; py/=idx.length;

    // Map to canvas
    hand.x = px * W();
    hand.y = py * H();
    hand.visible  = true;
    hand._lastSeen = Date.now();

    // Fist: count how many fingers are curled
    const TIPS=[8,12,16,20], PIPS=[6,10,14,18];
    const curled   = TIPS.filter((t,i)=> lms[t].y > lms[PIPS[i]].y).length;
    const extended = TIPS.filter((t,i)=> lms[t].y < lms[PIPS[i]].y).length;

    if(curled   >= 3) hand.fist = true;
    if(extended >= 1) hand.fist = false;  // just 1 finger open = release

    dbgText += `${label}: ${hand.fist?'✊ FIST':'✋ open'} ready=${hand.readyToGrab} curled=${curled} extended=${extended} | `;
  });

  document.getElementById('dbg').textContent = dbgText;
}

// ── Start camera ──
document.getElementById('btn-start').onclick = async function(){
  document.getElementById('ov-welcome').style.display='none';
  document.getElementById('dbg').textContent='Starting camera...';

  // Hidden video for MediaPipe
  const video = document.createElement('video');
  video.autoplay=true; video.playsinline=true; video.muted=true;

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:640, height:480, facingMode:'user' }
    });
    video.srcObject = stream;
    document.getElementById('pvid').srcObject = stream;
    await video.play();
    await document.getElementById('pvid').play();
  } catch(e){
    document.getElementById('dbg').textContent='Camera error: '+e.message;
    return;
  }

  const handsMP = new Hands({
    locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  handsMP.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.5,
  });
  handsMP.onResults(onResults);

  document.getElementById('dbg').textContent='Loading hand model...';

  const camera = new Camera(video,{
    onFrame: async()=>{ await handsMP.send({image:video}); },
    width:640, height:480,
  });
  camera.start();

  // Init hidden lastSeen
  H_RIGHT._lastSeen = 0;
  H_LEFT._lastSeen  = 0;

  spawnRound();
  t0=Date.now();
  running=true;
  ui();
};

window.restart = restart;
loop();
</script>
</body>
</html>
