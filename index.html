<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracker Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#fff; font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; gap:16px; }
h1 { color:#7ef7c8; font-size:20px; }
#container { position:relative; width:640px; height:480px; border:2px solid #7ef7c840; border-radius:12px; overflow:hidden; }
video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }
canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
#info { background:rgba(0,0,0,0.7); border:1px solid #7ef7c840; border-radius:10px; padding:14px 20px; width:640px; font-size:13px; line-height:2; }
#info span { color:#7ef7c8; font-weight:600; }
.row { display:flex; justify-content:space-between; }
button { padding:12px 28px; background:#7ef7c8; color:#0a0a1a; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
#status { color:#ffd700; font-size:13px; }
</style>
</head>
<body>
<h1>✋ Hand Tracking Test</h1>
<div id="status">Click Start to begin</div>
<button onclick="start()">Start Camera</button>

<div id="container" style="display:none">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>
</div>

<div id="info" style="display:none">
  <div class="row"><span>Status:</span> <span id="i-status">waiting...</span></div>
  <div class="row"><span>Hands detected:</span> <span id="i-hands">0</span></div>
  <div class="row"><span>Right hand position:</span> <span id="i-rpos">—</span></div>
  <div class="row"><span>Left hand position:</span>  <span id="i-lpos">—</span></div>
  <div class="row"><span>Right pinch distance:</span><span id="i-rpinch">—</span></div>
  <div class="row"><span>Left pinch distance:</span> <span id="i-lpinch">—</span></div>
  <div class="row"><span>Right grabbing:</span>      <span id="i-rgrab">—</span></div>
  <div class="row"><span>Left grabbing:</span>       <span id="i-lgrab">—</span></div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

const vid  = document.getElementById('vid');
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
let lm=null, lastT=-1;

window.start = async function(){
  document.querySelector('button').textContent='Starting...';
  document.getElementById('status').textContent='Requesting camera...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:640, height:480, facingMode:'user' }
    });
    vid.srcObject=stream;
    await vid.play();
    document.getElementById('container').style.display='block';
    document.getElementById('info').style.display='block';
    document.querySelector('button').style.display='none';
    document.getElementById('status').textContent='Camera on — loading hand model...';

    const vision=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    lm=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO", numHands:2,
      minHandDetectionConfidence:.5,
      minHandPresenceConfidence:.5,
      minTrackingConfidence:.5,
    });
    document.getElementById('status').textContent='Ready! Show your hands';
    document.getElementById('i-status').textContent='Model loaded ✓';
    detect();
  } catch(e) {
    document.getElementById('status').textContent='Error: '+e.message;
  }
};

const CONNECTIONS=[
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function detect(){
  if(lm && vid.readyState>=2 && vid.currentTime!==lastT){
    lastT=vid.currentTime;
    cv.width=vid.videoWidth; cv.height=vid.videoHeight;

    const res=lm.detectForVideo(vid,performance.now());
    ctx.clearRect(0,0,cv.width,cv.height);

    const info={
      hands:0,
      rpos:'—', lpos:'—',
      rpinch:'—', lpinch:'—',
      rgrab:'—', lgrab:'—',
    };

    if(res.landmarks && res.landmarks.length>0){
      info.hands=res.landmarks.length;

      res.handedness.forEach((ha,i)=>{
        const raw=ha[0].categoryName;
        // swap because front camera mirrors
        const label=raw==='Left'?'Right':'Left';
        const lms=res.landmarks[i];
        const W=cv.width, H=cv.height;

        // Draw skeleton
        ctx.save();
        ctx.scale(-1,1); ctx.translate(-W,0); // mirror to match video
        const col=label==='Right'?'#00c8ff':'#50ff78';

        // connections
        ctx.strokeStyle=col; ctx.lineWidth=2;
        for(const [a,b] of CONNECTIONS){
          ctx.beginPath();
          ctx.moveTo(lms[a].x*W, lms[a].y*H);
          ctx.lineTo(lms[b].x*W, lms[b].y*H);
          ctx.stroke();
        }

        // dots
        lms.forEach((lm,j)=>{
          ctx.beginPath();
          ctx.arc(lm.x*W, lm.y*H, j===4||j===8?8:5, 0, Math.PI*2);
          ctx.fillStyle=j===4||j===8?'#ffd700':col;
          ctx.fill();
        });

        ctx.restore();

        // Palm centre
        const mi=[0,5,9,13,17];
        let px=0,py=0;
        for(const idx of mi){px+=lms[idx].x;py+=lms[idx].y;}
        px/=mi.length; py/=mi.length;

        // Pinch
        const pinch=Math.hypot(lms[4].x-lms[8].x,lms[4].y-lms[8].y);
        const grab=pinch<0.08;

        if(label==='Right'){
          info.rpos=`x:${(px*100).toFixed(1)}% y:${(py*100).toFixed(1)}%`;
          info.rpinch=pinch.toFixed(4)+(pinch<0.08?' ← GRABBING':'');
          info.rgrab=grab?'YES ✊':'no ✋';
        } else {
          info.lpos=`x:${(px*100).toFixed(1)}% y:${(py*100).toFixed(1)}%`;
          info.lpinch=pinch.toFixed(4)+(pinch<0.08?' ← GRABBING':'');
          info.lgrab=grab?'YES ✊':'no ✋';
        }

        // Label on video
        ctx.save();
        ctx.scale(-1,1); ctx.translate(-W,0);
        ctx.fillStyle=col; ctx.font='bold 18px Segoe UI';
        ctx.textAlign='center';
        ctx.fillText(label+' '+(grab?'GRAB':'open'), px*W, py*H-30);
        ctx.restore();
      });
    } else {
      info.hands=0;
      document.getElementById('i-status').textContent='No hands in view — move closer';
    }

    document.getElementById('i-hands').textContent=info.hands;
    document.getElementById('i-rpos').textContent=info.rpos;
    document.getElementById('i-lpos').textContent=info.lpos;
    document.getElementById('i-rpinch').textContent=info.rpinch;
    document.getElementById('i-lpinch').textContent=info.lpinch;
    document.getElementById('i-rgrab').textContent=info.rgrab;
    document.getElementById('i-lgrab').textContent=info.lgrab;
  }
  requestAnimationFrame(detect);
}
</script>
</body>
</html>
